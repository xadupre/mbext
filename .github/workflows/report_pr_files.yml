name: Report Impacted Files

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  report:
    name: Report impacted files
    runs-on: ubuntu-latest
    steps:
      - name: Report changed files as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });

            const fileLines = files.map(f => {
              const icon = f.status === 'added' ? '🟢' :
                           f.status === 'removed' ? '🔴' :
                           f.status === 'renamed' ? '🔄' : '🔵';
              return `${icon} \`${f.filename}\` (+${f.additions} / -${f.deletions})`;
            });

            const body = [
              '## 📂 Impacted Files',
              '',
              `_${files.length} file(s) changed in this pull request:_`,
              '',
              ...fileLines,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '## 📂 Impacted Files';
            const existing = comments.find(
              c => c.user.type === 'Bot' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
