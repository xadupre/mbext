name: Fast Tests - ORT Nightly

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read

jobs:
  tests:
    name: ci (${{ matrix.os }}, py${{ matrix.python-version }}, torch-${{ matrix.torch-version || 'stable' }}, ort-nightly)
    runs-on: ${{ matrix.os }}
    # Hard ceiling so a hung test/ORT-nightly regression aborts cleanly with logs
    # instead of leaving the job in a silent "in_progress" state for hours.
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest"]
        python-version: ["3.13"]
        torch-version: ["2.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # we install torch first to avoid downloading any CUDA dependency

      - name: Install pytorch ${{ matrix.torch-version }} (Linux/Windows)
        if: matrix.os != 'macos-latest'
        run: pip install torch==2.11.0+cpu torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -e ".[dev]" "transformers==5.6" tokenizers

      - name: Remove existing onnxruntime before installing nightly
        run: pip uninstall -y onnxruntime onnxruntime-gpu onnxruntime-directml onnxruntime-openvino 2>/dev/null || true

      - name: Install onnxruntime nightly
        run: pip install -i https://aiinfra.pkgs.visualstudio.com/PublicPackages/_packaging/ORT-Nightly/pypi/simple/ --pre onnxruntime

      - name: pip freeze
        run: pip freeze

      - name: Run fast tests
        continue-on-error: true
        # --timeout=180 aborts any single test that hangs (e.g. on an
        # onnxruntime-nightly regression) and prints a Python traceback so the
        # offending test is identifiable instead of the whole job running out
        # of time silently.
        run: DOCLEAN=1&&pytest tests/fast -v --timeout=180 --cov=modelbuilder --cov-report=xml --cov-report=term-missing

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: fast-tests-ort-nightly

      - name: Upload stats artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stats-${{ matrix.os }}-py${{ matrix.python-version }}-torch${{ matrix.torch-version }}-ort-nightly
          path: stats/
          if-no-files-found: ignore
